<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 280" width="820" height="280">
  <defs>
    <pattern id="dots" x="0" y="0" width="28" height="28" patternUnits="userSpaceOnUse">
      <circle cx="1" cy="1" r="1" fill="#1e3a5a"/>
    </pattern>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0b1628"/>
      <stop offset="100%" stop-color="#0d1e35"/>
    </linearGradient>
    <linearGradient id="boxGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0d2240"/>
      <stop offset="100%" stop-color="#091830"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="820" height="280" fill="url(#bg)"/>
  <rect width="820" height="280" fill="url(#dots)"/>

  <!-- Top teal accent bar -->
  <rect width="820" height="3" fill="#0d9488"/>

  <!-- Subtle teal glow strip at top -->
  <rect width="820" height="40" fill="#0d9488" opacity="0.04"/>

  <!-- DYNAMICS 365 eyebrow label -->
  <text x="410" y="36"
        text-anchor="middle"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif"
        font-size="10" font-weight="700" letter-spacing="4" fill="#0d9488">DYNAMICS 365</text>

  <!-- Main heading -->
  <text x="410" y="68"
        text-anchor="middle"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="22" font-weight="700" fill="#f1f5f9">Building Applications of the Future</text>

  <!-- Divider line -->
  <line x1="330" y1="82" x2="490" y2="82" stroke="#1e3a5a" stroke-width="1"/>

  <!-- ═══════════════ COMPONENT 1: COMMON DATA SERVICE ═══════════════ -->
  <rect x="115" y="102" width="180" height="140" rx="8"
        fill="url(#boxGrad)" stroke="#0d9488" stroke-width="1.5" opacity="0.9"/>

  <!-- Database cylinder icon -->
  <ellipse cx="205" cy="128" rx="22" ry="7"
           fill="#0d2240" stroke="#0d9488" stroke-width="1.5"/>
  <rect x="183" y="128" width="44" height="20" fill="#0d2240"/>
  <line x1="183" y1="128" x2="183" y2="148" stroke="#0d9488" stroke-width="1.5"/>
  <line x1="227" y1="128" x2="227" y2="148" stroke="#0d9488" stroke-width="1.5"/>
  <ellipse cx="205" cy="148" rx="22" ry="7"
           fill="#0d2240" stroke="#0d9488" stroke-width="1.5"/>
  <!-- inner line on cylinder -->
  <ellipse cx="205" cy="136" rx="22" ry="7"
           fill="none" stroke="#0d9488" stroke-width="0.75" opacity="0.5"/>

  <text x="205" y="175"
        text-anchor="middle"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif"
        font-size="11" font-weight="700" fill="#e2e8f0">Common Data Service</text>
  <text x="205" y="193"
        text-anchor="middle"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif"
        font-size="9.5" fill="#64748b">Data foundation &amp;</text>
  <text x="205" y="208"
        text-anchor="middle"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif"
        font-size="9.5" fill="#64748b">integration backbone</text>
  <text x="205" y="228"
        text-anchor="middle"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif"
        font-size="9" fill="#0d9488" letter-spacing="1">CDS</text>

  <!-- ═══════════════ ARROW 1 ═══════════════ -->
  <line x1="298" y1="172" x2="318" y2="172" stroke="#0d9488" stroke-width="1.5"/>
  <path d="M 313 168 L 321 172 L 313 176" fill="none" stroke="#0d9488" stroke-width="1.5"
        stroke-linejoin="round" stroke-linecap="round"/>
  <!-- Bidirectional hint -->
  <circle cx="308" cy="172" r="2" fill="#0d9488" opacity="0.4"/>

  <!-- ═══════════════ COMPONENT 2: POWER APPS ═══════════════ -->
  <rect x="325" y="102" width="180" height="140" rx="8"
        fill="url(#boxGrad)" stroke="#0d9488" stroke-width="1.5" opacity="0.9"/>

  <!-- Mobile/grid icon -->
  <rect x="396" y="115" width="11" height="11" rx="2" fill="#0d9488" opacity="0.9"/>
  <rect x="411" y="115" width="11" height="11" rx="2" fill="#0d9488" opacity="0.55"/>
  <rect x="396" y="130" width="11" height="11" rx="2" fill="#0d9488" opacity="0.55"/>
  <rect x="411" y="130" width="11" height="11" rx="2" fill="#0d9488" opacity="0.9"/>
  <!-- small phone frame suggestion -->
  <rect x="403" y="113" width="17" height="31" rx="3" fill="none" stroke="#0d9488" stroke-width="1" opacity="0.25"/>

  <text x="415" y="175"
        text-anchor="middle"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif"
        font-size="11" font-weight="700" fill="#e2e8f0">Power Apps</text>
  <text x="415" y="193"
        text-anchor="middle"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif"
        font-size="9.5" fill="#64748b">Rapid, low-code</text>
  <text x="415" y="208"
        text-anchor="middle"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif"
        font-size="9.5" fill="#64748b">application development</text>
  <text x="415" y="228"
        text-anchor="middle"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif"
        font-size="9" fill="#0d9488" letter-spacing="1">POWERAPPS</text>

  <!-- ═══════════════ ARROW 2 ═══════════════ -->
  <line x1="508" y1="172" x2="528" y2="172" stroke="#0d9488" stroke-width="1.5"/>
  <path d="M 523 168 L 531 172 L 523 176" fill="none" stroke="#0d9488" stroke-width="1.5"
        stroke-linejoin="round" stroke-linecap="round"/>
  <circle cx="518" cy="172" r="2" fill="#0d9488" opacity="0.4"/>

  <!-- ═══════════════ COMPONENT 3: AZURE FUNCTIONS ═══════════════ -->
  <rect x="535" y="102" width="180" height="140" rx="8"
        fill="url(#boxGrad)" stroke="#0d9488" stroke-width="1.5" opacity="0.9"/>

  <!-- Lightning bolt -->
  <path d="M 628 114 L 616 140 L 624 140 L 612 163 L 635 134 L 625 134 L 637 114 Z"
        fill="#0d9488"/>
  <!-- glow effect on bolt -->
  <path d="M 628 114 L 616 140 L 624 140 L 612 163 L 635 134 L 625 134 L 637 114 Z"
        fill="#0d9488" opacity="0.3" filter="url(#glow)"/>

  <text x="625" y="175"
        text-anchor="middle"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif"
        font-size="11" font-weight="700" fill="#e2e8f0">Azure Functions</text>
  <text x="625" y="193"
        text-anchor="middle"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif"
        font-size="9.5" fill="#64748b">Serverless compute</text>
  <text x="625" y="208"
        text-anchor="middle"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif"
        font-size="9.5" fill="#64748b">for custom logic</text>
  <text x="625" y="228"
        text-anchor="middle"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif"
        font-size="9" fill="#0d9488" letter-spacing="1">FUNCTIONS</text>

  <!-- ═══════════════ BOTTOM TAGLINE ═══════════════ -->
  <text x="410" y="260"
        text-anchor="middle"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif"
        font-size="10.5" fill="#334155" letter-spacing="0.3">
    The modern extensibility model for Dynamics 365 — replacing .NET customisations with cloud-native services
  </text>

  <!-- Corner accents -->
  <circle cx="22" cy="22" r="2" fill="#0d9488" opacity="0.4"/>
  <circle cx="30" cy="22" r="1.2" fill="#0d9488" opacity="0.2"/>
  <circle cx="22" cy="30" r="1.2" fill="#0d9488" opacity="0.2"/>
  <circle cx="798" cy="258" r="2" fill="#0d9488" opacity="0.4"/>
  <circle cx="790" cy="258" r="1.2" fill="#0d9488" opacity="0.2"/>
  <circle cx="798" cy="250" r="1.2" fill="#0d9488" opacity="0.2"/>
</svg>
