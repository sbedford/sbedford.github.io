---
layout: default
---

<article class="post">
  <h1>{{ page.title }}</h1>

  {% if page.banner %}
    <img src="{{ site.baseurl }}{{ page.banner }}" alt="{{ page.title }}" class="post-card-featured__banner"/>
  {% endif %}

  <div class="post-meta">
    <span class="date">{{ page.date | date: "%-d %B %Y" }}</span>
  </div>

  {% include series-nav.html %}

  {% if page.byline %}
  <blockquote>{{ page.byline }}</blockquote>
  {% endif %}

  <div class="entry">
    {{ content }}
  </div>

  <div class="comments">
    {% include disqus.html %}
  </div>
</article>
