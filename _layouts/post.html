---
layout: default
---

<article class="post">
  <h1>{{ page.title }}</h1>

  <div class="post-meta">
    <span class="date">{{ page.date | date: "%-d %B %Y" }}</span>
  </div>

  {% if page.byline %}
  <blockquote>{{ page.byline }}</blockquote>
  {% endif %}

  <div class="entry">
    {{ content }}
  </div>

  <div class="comments">
    {% include disqus.html %}
  </div>
</article>
